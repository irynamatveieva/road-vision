name: "road_vision"
services:
  mqtt:
    image: eclipse-mosquitto
    container_name: mqtt
    volumes:
      - ./mosquitto:/mosquitto
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    ports:
      - "1883:1883"
      - "9001:9001"
    networks:
      road_vision:

  postgres_db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: test_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/structure.sql:/docker-entrypoint-initdb.d/structure.sql
    ports:
      - "5434:5432"
    networks:
      road_vision:

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      road_vision:

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6380:6379"
    networks:
      road_vision:

  store:
    container_name: store
    build: ../../store
    depends_on:
      - postgres_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: test_db
      POSTGRES_HOST: postgres_db
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    networks:
      road_vision:

  hub:
    container_name: hub
    build: ../../hub
    depends_on:
      - mqtt
      - redis
      - store
    restart: always
    environment:
      STORE_API_HOST: "store"
      STORE_API_PORT: 8000
      REDIS_HOST: "redis"
      REDIS_PORT: 6379
      MQTT_BROKER_HOST: "mqtt"
      MQTT_BROKER_PORT: 1883
      MQTT_TOPIC: "processed_data_topic"
      BATCH_SIZE: 10
    ports:
      - "9000:8000"
    networks:
      road_vision:

  edge:
    container_name: edge
    build: ..
    depends_on:
      - mqtt
      - hub
    restart: always
    environment:
      MQTT_BROKER_HOST: "mqtt"
      MQTT_BROKER_PORT: 1883
      MQTT_TOPIC: "agent_data_topic"
      HUB_MQTT_BROKER_HOST: "mqtt"
      HUB_MQTT_BROKER_PORT: 1883
      HUB_MQTT_TOPIC: "processed_data_topic"
      HUB_HOST: "hub"
      HUB_PORT: 8000
    networks:
      road_vision:

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on:
      - postgres_db
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ../../grafana/provisioning:/etc/grafana/provisioning
      - ../../grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    networks:
      road_vision:

  mapview:
    container_name: mapview
    build: ../../mapview
    environment:
      PORT: 8050
      # Браузер користувача підключається до Store WebSocket на хості
      STORE_WS_HOST: "localhost"
      STORE_WS_PORT: 8000
    ports:
      - "8050:8050"
    networks:
      road_vision:

  fake_agent:
    container_name: agent
    build: ../../agent
    depends_on:
      - mqtt
    environment:
      MQTT_BROKER_HOST: "mqtt"
      MQTT_BROKER_PORT: 1883
      MQTT_TOPIC: "agent_data_topic"
      MQTT_PARKING_TOPIC: "parking_data_topic"
      DELAY: 0.5
      BATCH_SIZE: 1
    networks:
      road_vision:

networks:
  road_vision:

volumes:
  postgres_data:
  pgadmin-data:
