# ---- Сервер ----
server.port=8000

# ---- Store API (куди Hub зберігає накопичені дані) ----
store.api.host=${STORE_API_HOST:localhost}
store.api.port=${STORE_API_PORT:8000}

# ---- Redis (буфер накопичення) ----
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ---- Логіка Hub ----
hub.batch-size=${BATCH_SIZE:10}

# ---- MQTT (прийом даних від Edge) ----
mqtt.broker.host=${MQTT_BROKER_HOST:localhost}
mqtt.broker.port=${MQTT_BROKER_PORT:1883}
mqtt.topic=${MQTT_TOPIC:processed_data_topic}

# ---- JSON: snake_case (road_state, agent_data, user_id, ...) ----
spring.jackson.property-naming-strategy=SNAKE_CASE

# ---- Swagger UI ----
springdoc.swagger-ui.path=/docs
springdoc.api-docs.path=/v3/api-docs
