<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapView — стан дорожнього покриття</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Arial, sans-serif; }
        #panel {
            padding: 10px 14px; background: #1e2a38; color: #fff;
            display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
        }
        #panel h1 { font-size: 18px; margin: 0 12px 0 0; }
        button {
            padding: 8px 14px; border: none; border-radius: 5px; cursor: pointer;
            font-size: 14px; background: #2d9cdb; color: #fff;
        }
        button:hover { background: #2585bd; }
        button.live { background: #27ae60; }
        button.live:hover { background: #1e8e4e; }
        .legend { display: flex; gap: 12px; margin-left: auto; font-size: 13px; }
        .legend span { display: inline-flex; align-items: center; gap: 5px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
        #status { font-size: 13px; opacity: .85; }
        #map { height: calc(100vh - 52px); width: 100%; }
        /* Віджет з показниками нових сенсорів */
        #widgets {
            position: absolute; top: 64px; right: 12px; z-index: 1000;
            display: none; flex-direction: column; gap: 8px;
        }
        .widget {
            min-width: 180px; padding: 10px 14px; border-radius: 8px; color: #fff;
            font-size: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.3); font-weight: bold;
        }
        .widget small { display: block; font-weight: normal; opacity: .9; font-size: 12px; }
    </style>
</head>
<body>
<div id="panel">
    <h1>🛣️ MapView — стан дорожнього покриття</h1>
    <button onclick="loadFromFile()">Завантажити з файлу</button>
    <button class="live" onclick="connectStore()">Підключитись до Store (наживо)</button>
    <button onclick="clearMap()">Очистити</button>
    <span id="status">готово</span>
    <div class="legend">
        <span><i class="dot" style="background:#27ae60"></i>smooth</span>
        <span><i class="dot" style="background:#f2994a"></i>bump</span>
        <span><i class="dot" style="background:#eb5757"></i>pothole</span>
    </div>
</div>
<div id="map"></div>

<!-- Віджети нових сенсорів (погода, освітлення) — заповнюються в режимі "наживо" -->
<div id="widgets">
    <div class="widget" id="w-weather" style="background:#2980b9">🌡️ <span id="w-temp">--</span>
        <small id="w-weather-state">погода</small></div>
    <div class="widget" id="w-light" style="background:#8e44ad">💡 <span id="w-light-state">--</span>
        <small id="w-lux">освітлення</small></div>
</div>

<script>
    const map = L.map('map').setView([50.4501, 30.5234], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap', maxZoom: 19
    }).addTo(map);

    let layer = L.layerGroup().addTo(map);
    let ws = null;

    const COLORS = { smooth: '#27ae60', bump: '#f2994a', pothole: '#eb5757' };
    const WEATHER_COLOR = { dry: '#2980b9', wet: '#16a085', icy: '#c0392b' };
    const LIGHT_COLOR = { bright: '#f39c12', dim: '#8e44ad', dark: '#2c3e50' };

    function setStatus(t) { document.getElementById('status').textContent = t; }

    // Виправлення переплутаних координат: широта Києва ~50, довгота ~30.
    function normalize(lat, lon) {
        if (lat >= 45 && lat <= 55) return [lat, lon];
        if (lon >= 45 && lon <= 55) return [lon, lat];
        return [lat, lon];
    }

    // rec: { roadState, lat, lon, weatherState?, lightState?, temperature?, lux? }
    function addPoint(rec) {
        const [a, b] = normalize(rec.lat, rec.lon);
        const color = COLORS[rec.roadState] || '#888';
        let popup = 'Дорога: <b>' + rec.roadState + '</b>';
        if (rec.weatherState) popup += '<br>Погода: <b>' + rec.weatherState + '</b>'
            + (rec.temperature !== undefined ? ' (' + rec.temperature.toFixed(1) + '°C)' : '');
        if (rec.lightState) popup += '<br>Освітлення: <b>' + rec.lightState + '</b>'
            + (rec.lux !== undefined ? ' (' + Math.round(rec.lux) + ' лк)' : '');
        popup += '<br>(' + a.toFixed(5) + ', ' + b.toFixed(5) + ')';
        L.circleMarker([a, b], {
            radius: rec.roadState === 'smooth' ? 5 : 8,
            color: color, fillColor: color, fillOpacity: 0.85, weight: 1
        }).bindPopup(popup).addTo(layer);
        return [a, b];
    }

    // Оновлення віджетів нових сенсорів
    function updateWidgets(rec) {
        document.getElementById('widgets').style.display = 'flex';
        if (rec.temperature !== undefined) {
            document.getElementById('w-temp').textContent = rec.temperature.toFixed(1) + '°C';
            document.getElementById('w-weather-state').textContent = 'дорога: ' + (rec.weatherState || '--');
            document.getElementById('w-weather').style.background = WEATHER_COLOR[rec.weatherState] || '#2980b9';
        }
        if (rec.lightState) {
            document.getElementById('w-light-state').textContent = rec.lightState;
            document.getElementById('w-lux').textContent = (rec.lux !== undefined ? Math.round(rec.lux) + ' лк' : 'освітлення');
            document.getElementById('w-light').style.background = LIGHT_COLOR[rec.lightState] || '#8e44ad';
        }
    }

    function clearMap() {
        layer.clearLayers();
        if (ws) { ws.close(); ws = null; }
        document.getElementById('widgets').style.display = 'none';
        setStatus('очищено');
    }

    // FileDatasource: завантаження маршруту з CSV-файлу
    async function loadFromFile() {
        clearMap();
        setStatus('завантаження з файлу...');
        const points = await fetch('/api/file-data').then(r => r.json());
        const path = [];
        points.forEach(p => path.push(addPoint({ roadState: p.roadState, lat: p.latitude, lon: p.longitude })));
        if (path.length) {
            L.polyline(path, { color: '#2d9cdb', weight: 2, opacity: 0.5 }).addTo(layer);
            map.fitBounds(path);
        }
        setStatus('завантажено з файлу: ' + points.length + ' точок');
    }

    // Інтеграція зі Store: підписка на оновлення через WebSocket (з новими сенсорами)
    async function connectStore() {
        clearMap();
        const cfg = await fetch('/api/config').then(r => r.json());
        const url = 'ws://' + cfg.storeWsHost + ':' + cfg.storeWsPort + '/ws/1';
        setStatus('підключення до ' + url + ' ...');
        ws = new WebSocket(url);
        let count = 0;
        ws.onopen = () => setStatus('підключено до Store, очікування даних...');
        ws.onmessage = (event) => {
            const d = JSON.parse(event.data);
            const rec = {
                roadState: d.road_state, lat: d.latitude, lon: d.longitude,
                weatherState: d.weather_state, lightState: d.light_state,
                temperature: d.temperature, lux: d.lux
            };
            const [a, b] = addPoint(rec);
            updateWidgets(rec);
            count++;
            setStatus('отримано зі Store: ' + count + ' точок');
            map.panTo([a, b]);
        };
        ws.onerror = () => setStatus('помилка підключення до Store (чи запущена система?)');
        ws.onclose = () => { if (count) setStatus('зʼєднання закрито, точок: ' + count); };
    }
</script>
</body>
</html>
