# ---- Сервер ----
server.port=8000

# ---- PostgreSQL (значення приходять зі змінних оточення, інакше — дефолт) ----
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:test_db}
spring.datasource.username=${POSTGRES_USER:user}
spring.datasource.password=${POSTGRES_PASSWORD:pass}

# ---- JPA / Hibernate ----
# Таблиця створюється через docker/db/structure.sql, тож схему не генеруємо
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ---- JSON: поля у форматі snake_case (road_state, agent_data, user_id, ...) ----
spring.jackson.property-naming-strategy=SNAKE_CASE

# ---- Swagger UI на /docs (як автодокументація FastAPI) ----
springdoc.swagger-ui.path=/docs
springdoc.api-docs.path=/v3/api-docs
